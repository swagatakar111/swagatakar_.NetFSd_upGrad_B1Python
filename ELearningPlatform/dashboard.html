<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard EduPath</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
  <nav>
    <a href="dashboard.html">Dashboard</a>
    <a href="courses.html">Courses</a>
    <a href="quiz.html">Quiz</a>
    <a href="profile.html">Profile</a>
  </nav>
</header>

<p class="breadcrumb">Home &gt; Dashboard</p>

<main>

  <div class="grid-container">

    <section>
      <h2>📋Course Overview</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Course</th>
              <th>Progress %</th>
              <th>Progress Bar</th>
            </tr>
          </thead>
          <tbody id="courseTable">
          </tbody>
        </table>
      </div>
    </section>

    <section>
      <h2>📊 Overall Progress</h2>
      <div class="progress-card">
        <p>Your average completion across all courses:</p>
        <progress id="progressBar" value="0" max="100"></progress>
        <p id="progressLabel">Loading...</p>
      </div>
    </section>

  </div>

</main>

<footer>
  <p>2026 EduPath. All rights reserved. | <a href="dashboard.html">Dashboard</a> | <a href="courses.html">Courses</a> | <a href="quiz.html">Quiz</a> | <a href="profile.html">Profile</a></p>
</footer>

<script src="js/data.js"></script>
<script src="js/utils.js"></script>
<script src="js/storage.js"></script>
<script src="js/app.js"></script>

<script>
  window.addEventListener("load", function () {
    let bar = document.getElementById("progressBar");
    let label = document.getElementById("progressLabel");
    if (bar && label) {
      label.textContent = Math.round(bar.value) + "% complete";
    }
  });
</script>

</body>
</html>
